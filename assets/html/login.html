<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WMSU Merch</title>
    <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>

<div class="login-wrap">

    <div class="login-box">
        <a href="javascript:history.back()" class="back-btn">← Back</a>
        <div class="brand">
            <img src="/assets/img/ico/WMSU logo.png" alt="">
            <h2>WMSU Merch</h2>
        </div>

        <p class="sub">Sign in to continue</p>

        <form>
            <input type="text" placeholder="Username" id="login-username" required>

            <div class="pass-box">
                <input type="password" id="login-password" placeholder="Password" required>
                <img src="/assets/img/ico/eye-close.png" class="toggle" id="toggle-pass" alt="toggle password">
            </div>

            <button type="submit" id="login-btn">Login</button>
        </form>

        <div class="meta">
            <p>No account? <a href="/assets/html/signup.html">Sign up</a></p>
        </div>

    </div>

</div>

<script src="/assets/js/login.js"></script>

</body>
</html>
