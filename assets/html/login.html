<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WMSU Merch</title>
    <link rel="stylesheet" href="/assets/css/login.css">
</head>
<body>

<main class="auth-page">
    <section class="auth-card" aria-labelledby="login-title">
        <a href="/index.html" class="back-btn">← Back</a>

        <div class="brand">
            <img src="/assets/img/ico/WMSU logo.png" alt="WMSU logo">
            <div>
                <p class="eyebrow">Welcome back</p>
                <h1 id="login-title">WMSU Merch</h1>
            </div>
        </div>

        <p class="sub">Sign in to manage orders, checkout faster, or access your dashboard.</p>

        <form id="login-form" novalidate>
            <label>
                Username
                <input type="text" placeholder="Enter username" id="login-username" autocomplete="username" required>
            </label>

            <label>
                Password
                <div class="pass-box">
                    <input type="password" id="login-password" placeholder="Enter password" autocomplete="current-password" required>
                    <button class="toggle-pass" type="button" data-target="login-password" aria-label="Show password">
                        <img src="/assets/img/ico/eye-close.png" alt="">
                    </button>
                </div>
            </label>

            <p id="login-message" class="form-message" role="status"></p>

            <button type="submit" id="login-btn">Login</button>
        </form>

        <div class="demo-box">
            <p><strong>Demo accounts</strong></p>
            <p>Admin: <code>ADMIN</code> / <code>69420</code></p>
            <p>Merchant: <code>MERCHANT</code> / <code>12345</code></p>
        </div>

        <div class="meta">
            <p>No account? <a href="/assets/html/signup.html">Create one</a></p>
        </div>
    </section>
</main>

<script src="/assets/js/login.js"></script>
</body>
</html>
