<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Account - WMSU Merch</title>
    <link rel="stylesheet" href="/assets/css/otp.css">
    <link rel="icon" type="image/x-icon" href="/assets/img/ico/WMSU logo.png">
    <link rel="stylesheet" href="/assets/css/theme.css">
    <script src="/assets/js/theme.js"></script>
</head>
<body>

<main class="otp-page">
    <section class="otp-card" aria-labelledby="otp-title">
        <a href="/assets/html/signup.html" class="back-btn" data-back-button>← Back</a>

        <div class="brand">
            <img src="/assets/img/ico/WMSU logo.png" alt="WMSU logo">
            <div>
                <p class="eyebrow">Mock verification</p>
                <h1 id="otp-title">Verify Your Account</h1>
            </div>
        </div>

        <p id="otp-help" class="sub">We generated a 6-digit demo code for your signup email.</p>
        <p id="email-target" class="email-target"></p>

        <div class="otp-inputs" aria-label="Enter 6-digit verification code">
            <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 1">
            <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2">
            <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3">
            <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4">
            <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 5">
            <input class="otp-digit" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 6">
        </div>

        <p id="msg" class="form-message" role="status"></p>

        <button id="verify-btn" type="button">Verify Account</button>
        <button id="resend-btn" type="button">Resend Code</button>

        <div class="hint-box">
            <strong>Demo only:</strong>
            <span>No real email is sent. The generated code appears in the popup for testing.</span>
        </div>
    </section>
</main>

<div id="otp-overlay" class="otp-overlay">
    <section class="otp-modal" aria-labelledby="modal-title">
        <h2 id="modal-title">Demo Code Sent</h2>
        <p id="otp-text">...</p>
        <div id="mock-code" class="mock-code"></div>
        <button id="otp-close" type="button">Use Code</button>
    </section>
</div>

    <script src="/assets/js/back-navigation.js"></script>
    <script src="/assets/js/otp.js"></script>
</body>
</html>
