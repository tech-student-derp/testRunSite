<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Status - WMSU Merch</title>
    <link rel="stylesheet" href="/assets/css/transaction-status.css">
    <link rel="icon" type="image/x-icon" href="/assets/img/ico/WMSU logo.png">
</head>
<body>

<main class="status-page">
    <section id="status-card" class="status-card">
        <div id="status-icon" class="status-icon">✓</div>
        <p class="eyebrow">Transaction Status</p>
        <h1 id="status-title">Complete</h1>
        <p id="status-message" class="status-message">Your transaction has been completed.</p>

        <div class="details-card">
            <div>
                <span>Order ID</span>
                <strong id="order-id">-</strong>
            </div>
            <div>
                <span>Transaction ID</span>
                <strong id="transaction-id">-</strong>
            </div>
            <div>
                <span>Payment Method</span>
                <strong id="payment-method">-</strong>
            </div>
            <div>
                <span>Total</span>
                <strong id="total">₱0</strong>
            </div>
        </div>

        <div class="actions">
            <a href="/index.html" class="primary-link">Back to Store</a>
            <a href="/assets/html/checkout.html" class="secondary-link">View Cart</a>
        </div>
    </section>
</main>

<script src="/assets/js/transaction-status.js"></script>
</body>
</html>
