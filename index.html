<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMSU Merch</title>
    <link rel="icon" type="image/png" href="assets/img/WMSU logo.png">
    <link rel="stylesheet" href="assets/css/main.css">

    
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo-and-title">
                <img src="assets/img/WMSU logo.png" alt="WMSU logo" class="icon">
                <h3 class="title">WMSU Merch</h3>
            </div>

            <div class="menu-box">
                <ul class="menu">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contacts</a></li>
                    <li><a href="#">Pricing</a></li>
                </ul>

                <button class="login-btn"><a href="#">Login</a></button>
                
                <button class="signup-btn"><a href="#">Sign Up</a></button>
            </div>
            
        </nav>

        <div class="search-box">

                <select class="sort-dropdown">
                        <option value="latest">Latest</option>
                        <option value="popular">Most Popular</option>
                        <option value="low-high">Price: Low to High</option>
                        <option value="high-low">Price: High to Low</option>
                </select>
                <form action="" class="search-form">
                    <input type="text" placeholder="Search for products" class="searchbar">
                    <button type="submit" class="search-btn">Search</button>
                </form>

                <div class="category-bar">
                    <a href="#">Shirts</a>
                    <a href="#">Lanyards</a>
                    <a href="#">Stickers</a>
                    <a href="#" class="disabled">Accessories</a>
                    <a href="#" class="disabled">Hoodies</a>
                </div>
                
        </div>
    </header>

    <main class="main-page">
        <h1>Hot picks for CCS Students</h1>
        <h3>Shirts<br><br></h3>
        <div class="product-container">
            <div class="product-grid">

                <div class="product-card" data-id="bs-shirt">
                    <a href="#">
                        <img src="assets/img/bs-shirt.png" class="product-img">
                    </a>
                    <p class="prod-name"><b>BSCS Shirt</b></p>
                    <p class="price">₱259</p>
                    <button class="preorder-btn">Preorder</button>
                </div>

                <div class="product-card" data-id="bs-shirt-2">
                    <a href="#">
                        <img src="assets/img/bs-shirt-2.png" class="product-img">
                    </a>
                    <p class="prod-name"><b>BSIT Shirt</b></p>
                    <p class="price">₱259</p>
                    <button class="preorder-btn">Preorder</button>
                </div>

                <div class="product-card" data-id="bs-shirt-3">
                    <a href="#">
                        <img src="assets/img/bs-shirt-3.png" class="product-img">
                    </a>
                    <p class="prod-name"><b>ACT AD Shirt</b></p>
                    <p class="price">₱259</p>
                    <button class="preorder-btn">Preorder</button>
                </div>

                <div class="product-card" data-id="bs-it-3">
                    <a href="#">
                        <img src="assets/img/bs-it-3.jpg" class="product-img">
                    </a>
                    <p class="prod-name"><b>BSIT Shirt</b></p>
                    <p class="price">₱259</p>
                    <button class="preorder-btn">Preorder</button>
                </div>

                <div class="product-card" data-id="act-ad-2">
                    <a href="#">
                        <img src="assets/img/act-ad-2.jpg" class="product-img">
                    </a>
                    <p class="prod-name"><b>ACT AD Shirt</b></p>
                    <p class="price">₱259</p>
                    <button class="preorder-btn">Preorder</button>
                </div>

                <div class="product-card" data-id="act-ad">
                    <a href="#">
                        <img src="assets/img/act-ad.jpg" class="product-img">
                    </a>
                    <p class="prod-name"><b>BSCS Shirt</b></p>
                    <p class="price">₱259</p>
                    <button class="preorder-btn">Preorder</button>
                </div>

            </div>
        </div>
    </main>

    <div id="hover-preview">
        <img id="preview-img" src="" alt="">

        <h3 id="preview-name"></h3>

        <p id="preview-rating"></p>
        <p id="preview-sold"></p>
        <p id="preview-price"></p>
        <p id="preview-review"></p>
        <p id="preview-sizes"></p>
    </div>

    <div id="overlay"></div>

    <div id="product-sidebar" class="sidebar">
        <div class="sidebar-content">

            <span id="close-sidebar" class="close-btn">×</span>

            <img id="side-img" src="" alt="">

            <h2 id="side-name"></h2>

            <p id="side-rating"></p>
            <p id="side-sold"></p>
            <p id="side-price"></p>
            <p id="side-sizes"></p>

            <h3>Reviews</h3>
            <p id="side-review"></p>

            <button class="preorder-btn">Preorder</button>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
